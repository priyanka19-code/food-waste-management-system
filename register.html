<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - WasteWise</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-leaf"></i>
                <span>WasteWise</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#about">About</a></li>
            </ul>
            <div class="nav-buttons">
                <a href="login.html" class="btn-login">Login</a>
                <a href="register.html" class="btn-register">Register</a>
            </div>
            <button class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Register Section -->
    <section class="auth-container" style="margin-bottom: 2rem;">
        <div class="auth-box">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem;">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h2>Create Account</h2>
                <p style="color: var(--gray-color);">Join WasteWise and start reducing food waste today</p>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="fullname"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="phone"><i class="fas fa-phone"></i> Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                </div>

                <div class="form-group">
                    <label for="usertype"><i class="fas fa-building"></i> User Type</label>
                    <select id="usertype" name="usertype" required>
                        <option value="">Select user type</option>
                        <option value="individual">Individual</option>
                        <option value="restaurant">Restaurant</option>
                        <option value="supermarket">Supermarket</option>
                        <option value="business">Business</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter a strong password" required>
                </div>

                <div class="form-group">
                    <label for="confirmpassword"><i class="fas fa-lock"></i> Confirm Password</label>
                    <input type="password" id="confirmpassword" name="confirmpassword" placeholder="Confirm your password" required>
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label style="display: flex; align-items: flex-start; font-weight: normal; color: var(--gray-color);">
                        <input type="checkbox" required style="margin-right: 0.5rem; margin-top: 0.2rem; cursor: pointer;">
                        <span>I agree to the <a href="#" style="color: var(--primary-color);">Terms and Conditions</a> and <a href="#" style="color: var(--primary-color);">Privacy Policy</a></span>
                    </label>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-toggle">
                Already have an account? <a href="login.html">Login here</a>
            </div>

            <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #ddd; text-align: center;">
                <p style="color: var(--gray-color); font-size: 0.9rem; margin-bottom: 1rem;">Or sign up with</p>
                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <button type="button" style="width: 50px; height: 50px; border: 2px solid #ddd; background: white; border-radius: 50%; cursor: pointer; transition: var(--transition);" onmouseover="this.style.borderColor='var(--primary-color)'" onmouseout="this.style.borderColor='#ddd'">
                        <i class="fab fa-google" style="color: #ea4335;"></i>
                    </button>
                    <button type="button" style="width: 50px; height: 50px; border: 2px solid #ddd; background: white; border-radius: 50%; cursor: pointer; transition: var(--transition);" onmouseover="this.style.borderColor='var(--primary-color)'" onmouseout="this.style.borderColor='#ddd'">
                        <i class="fab fa-facebook" style="color: #1877f2;"></i>
                    </button>
                    <button type="button" style="width: 50px; height: 50px; border: 2px solid #ddd; background: white; border-radius: 50%; cursor: pointer; transition: var(--transition);" onmouseover="this.style.borderColor='var(--primary-color)'" onmouseout="this.style.borderColor='#ddd'">
                        <i class="fab fa-github" style="color: #333;"></i>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 WasteWise. All rights reserved.</p>
        <p>Smart Food Waste Management System</p>
    </footer>

    <script src="script.js"></script>
    <script>
        function handleRegister(event) {
            event.preventDefault();
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmpassword = document.getElementById('confirmpassword').value;

            if (password !== confirmpassword) {
                alert('Passwords do not match!');
                return;
            }

            if (fullname && email && password) {
                alert('Registration successful! Redirecting to login...');
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
